name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -o game.zip
        ls -la

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev libbz2-dev

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" virtualenv
        pip install git+https://github.com/kivy/buildozer.git

    - name: Configure buildozer.spec and Fix Licenses
      run: |
        # حل تداخل ورژن و تنظیم نیازمندی‌ها
        sed -i 's/version.regex = .*/# version.regex = /g' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy==2.3.0,plyer,pillow/g' buildozer.spec
        
        # مجبور کردن بویلدوزر به استفاده از نسخه پایدار اندروید ۳۳ یا ۳۴ به جای ۳۷ فرسایشی
        sed -i 's/android.api = .*/android.api = 33/g' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/g' buildozer.spec
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        
        # تایید پیش‌فرض تمام لایسنس‌های اندروید در محیط لینوکس
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
    - name: Build Android APK
      run: |
        export PATH=$PATH:~/.local/bin/
        # ارسال دستور yes به تمام لایسنس‌های احتمالی حین ساخت
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: leprecoin-apk
        path: bin/*.apk
